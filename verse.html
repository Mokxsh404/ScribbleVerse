<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribbleVerse — Where Doodles Dissolve into Poetry</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Lora:ital,wght@0,400..700;1,400..700&family=Special+Elite&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-main">
                <div class="logo-area">
                    <i class="fa-solid fa-feather-pointed ink-logo"></i>
                    <h1 class="app-title">ScribbleVerse</h1>
                </div>
                <div class="control-group">
                    <button id="btn-audio-toggle" class="btn-tactile small active">
                        <i class="fa-solid fa-volume-high"></i>
                        <span class="audio-text">Sound ON</span>
                    </button>
                    <button id="btn-api-settings" class="btn-tactile small">
                        <i class="fa-solid fa-key"></i> Settings
                    </button>
                </div>
            </div>
            <div class="app-subtitle">Where doodles dissolve into poetry</div>
        </header>

        <!-- Desk Workspace Grid -->
        <main class="desk-workspace">
            <!-- Left Card: Sketchpad -->
            <div class="workspace-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-pen-fancy"></i> Sketchpad</h2>
                    <div id="drawing-stats" class="tool-status">Blank Paper</div>
                </div>
                
                <div class="canvas-wrapper">
                    <canvas id="sketchpad"></canvas>
                    <!-- Image Upload Drop Zone Overlay -->
                    <div id="upload-overlay" class="upload-overlay hidden">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Drop image here</p>
                    </div>
                </div>
                
                <!-- Hidden file input for image upload -->
                <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
                
                <div class="sketchpad-controls">
                    <div class="control-row">
                        <div class="control-group">
                            <span class="group-label">Brush</span>
                            <div id="brush-selector" class="control-group">
                                <button class="btn-tool active" data-brush="fountain">
                                    <i class="fa-solid fa-pen-nib"></i> Fountain
                                </button>
                                <button class="btn-tool" data-brush="calligraphy">
                                    <i class="fa-solid fa-signature"></i> Calligraphy
                                </button>
                                <button class="btn-tool" data-brush="charcoal">
                                    <i class="fa-solid fa-brush"></i> Charcoal
